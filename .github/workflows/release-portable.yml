name: CI/CD Portable Windows

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  quality:
    name: Lint and audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            bdgen/web/package-lock.json
            bdgen/desktop/package-lock.json

      - name: Install backend dependencies
        run: uv sync
        working-directory: bdgen
        env:
          UV_PROJECT_ENVIRONMENT: ../.venv

      - name: Install frontend dependencies
        run: npm ci
        working-directory: bdgen/web

      - name: Install desktop dependencies
        run: npm ci
        working-directory: bdgen/desktop

      - name: Run all linters
        run: make lint

      - name: Audit frontend dependencies
        run: npm audit --audit-level=critical
        working-directory: bdgen/web

      - name: Audit desktop dependencies
        run: npm audit --audit-level=critical
        working-directory: bdgen/desktop

  release-portable:
    name: Build and release portable exe
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            bdgen/web/package-lock.json
            bdgen/desktop/package-lock.json

      - name: Compute next SemVer
        id: version
        shell: pwsh
        run: |
          $tags = git tag --list "v[0-9]*" | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Sort-Object { [version]($_.Substring(1)) }
          $headTag = git tag --points-at HEAD --list "v[0-9]*" | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Sort-Object { [version]($_.Substring(1)) } | Select-Object -Last 1

          if ($headTag) {
            $version = $headTag.Substring(1)
            "version=$version" >> $env:GITHUB_OUTPUT
            "tag=$headTag" >> $env:GITHUB_OUTPUT
            "tag_exists=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $lastTag = $tags | Select-Object -Last 1
          if ($lastTag) {
            $base = [version]$lastTag.Substring(1)
            $messages = git log --format=%B "$lastTag..HEAD"
          } else {
            $package = Get-Content -Raw "bdgen/desktop/package.json" | ConvertFrom-Json
            $base = [version]$package.version
            $messages = git log --format=%B
          }

          $bump = "patch"
          if ($messages -match "(?m)^BREAKING CHANGE:" -or $messages -match "(?m)^[a-zA-Z]+(\([^)]+\))?!:") {
            $bump = "major"
          } elseif ($messages -match "(?m)^feat(\([^)]+\))?:") {
            $bump = "minor"
          }

          if ($bump -eq "major") {
            $version = "$($base.Major + 1).0.0"
          } elseif ($bump -eq "minor") {
            $version = "$($base.Major).$($base.Minor + 1).0"
          } else {
            $version = "$($base.Major).$($base.Minor).$($base.Build + 1)"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "tag_exists=false" >> $env:GITHUB_OUTPUT

      - name: Apply desktop package version
        shell: pwsh
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
        working-directory: bdgen/desktop

      - name: Install backend dependencies
        run: uv sync
        working-directory: bdgen
        env:
          UV_PROJECT_ENVIRONMENT: ../.venv

      - name: Build frontend static assets
        run: |
          npm ci
          npm run build
        working-directory: bdgen/web

      - name: Build backend executable
        shell: pwsh
        run: |
          uv run pyinstaller --distpath ../build/backend --workpath ../build/pyinstaller-work bdgen-server.spec
          if (!(Test-Path -LiteralPath "../build/backend/bdgen-server.exe")) {
            throw "Missing backend executable: build/backend/bdgen-server.exe"
          }
        working-directory: bdgen
        env:
          UV_PROJECT_ENVIRONMENT: ../.venv

      - name: Build portable executable
        run: |
          npm ci
          npm run build:portable
        working-directory: bdgen/desktop

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BdGEN-${{ steps.version.outputs.version }}-portable-windows
          path: build/portable/*.exe
          if-no-files-found: error

      - name: Create git tag
        if: steps.version.outputs.tag_exists == 'false'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $asset = Get-ChildItem -Path "build/portable" -Filter "*.exe" | Select-Object -First 1
          if (-not $asset) {
            throw "Portable executable not found in build/portable."
          }

          $notes = @"
          Automated portable Windows release for BdGEN $version.

          Quality gates:
          - Backend, frontend and desktop lint passed.
          - Frontend and desktop npm audit passed with no critical vulnerabilities.
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset.FullName --clobber
          } else {
            gh release create $tag $asset.FullName --title "BdGEN $version" --notes $notes
          }
