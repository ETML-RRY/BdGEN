name: CI/CD Desktop Releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  quality:
    name: Lint and audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            bdgen/web/package-lock.json
            bdgen/desktop/package-lock.json

      - name: Install backend dependencies
        run: uv sync
        working-directory: bdgen
        env:
          UV_PROJECT_ENVIRONMENT: ../.venv

      - name: Install frontend dependencies
        run: npm ci
        working-directory: bdgen/web

      - name: Install desktop dependencies
        run: npm ci
        working-directory: bdgen/desktop

      - name: Run all linters
        run: make lint

      - name: Audit frontend dependencies
        run: npm audit --audit-level=critical
        working-directory: bdgen/web

      - name: Audit desktop dependencies
        run: npm audit --audit-level=critical
        working-directory: bdgen/desktop

  version:
    name: Compute release version
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next SemVer
        id: version
        shell: pwsh
        run: |
          $tags = git tag --list "v[0-9]*" | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Sort-Object { [version]($_.Substring(1)) }
          $headTag = git tag --points-at HEAD --list "v[0-9]*" | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Sort-Object { [version]($_.Substring(1)) } | Select-Object -Last 1

          if ($headTag) {
            $version = $headTag.Substring(1)
            "version=$version" >> $env:GITHUB_OUTPUT
            "tag=$headTag" >> $env:GITHUB_OUTPUT
            "tag_exists=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $lastTag = $tags | Select-Object -Last 1
          if ($lastTag) {
            $base = [version]$lastTag.Substring(1)
            $messages = git log --format=%B "$lastTag..HEAD"
          } else {
            $package = Get-Content -Raw "bdgen/desktop/package.json" | ConvertFrom-Json
            $base = [version]$package.version
            $messages = git log --format=%B
          }

          $bump = "patch"
          if ($messages -match "(?m)^BREAKING CHANGE:" -or $messages -match "(?m)^[a-zA-Z]+(\([^)]+\))?!:") {
            $bump = "major"
          } elseif ($messages -match "(?m)^feat(\([^)]+\))?:") {
            $bump = "minor"
          }

          if ($bump -eq "major") {
            $version = "$($base.Major + 1).0.0"
          } elseif ($bump -eq "minor") {
            $version = "$($base.Major).$($base.Minor + 1).0"
          } else {
            $version = "$($base.Major).$($base.Minor).$($base.Build + 1)"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "tag_exists=false" >> $env:GITHUB_OUTPUT

  tag-release:
    name: Create release tag
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        if: needs.version.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.version.outputs.tag }}
          git push origin ${{ needs.version.outputs.tag }}

  build-desktop:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs:
      - version
      - tag-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            label: Windows portable exe
            os: windows-latest
            build_script: build:windows
            backend_binary: ../build/backend/bdgen-server.exe
            artifact_name: windows-portable
            artifact_path: build/portable/*.exe
          - platform: macos
            label: unsigned macOS DMG
            os: macos-latest
            build_script: build:mac
            backend_binary: ../build/backend/bdgen-server
            artifact_name: macos-dmg-unsigned
            artifact_path: build/mac/*.dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            bdgen/web/package-lock.json
            bdgen/desktop/package-lock.json

      - name: Apply desktop package version
        shell: pwsh
        run: npm version ${{ needs.version.outputs.version }} --no-git-tag-version --allow-same-version
        working-directory: bdgen/desktop

      - name: Install backend dependencies
        run: uv sync
        working-directory: bdgen
        env:
          UV_PROJECT_ENVIRONMENT: ../.venv

      - name: Build frontend static assets
        run: |
          npm ci
          npm run build
        working-directory: bdgen/web

      - name: Build backend executable
        shell: pwsh
        run: |
          uv run pyinstaller --distpath ../build/backend --workpath ../build/pyinstaller-work bdgen-server.spec
          if (!(Test-Path -LiteralPath "${{ matrix.backend_binary }}")) {
            throw "Missing backend executable: ${{ matrix.backend_binary }}"
          }
          if ("${{ matrix.platform }}" -ne "windows") {
            chmod +x "${{ matrix.backend_binary }}"
          }
        working-directory: bdgen
        env:
          UV_PROJECT_ENVIRONMENT: ../.venv

      - name: Build desktop artifact
        run: |
          npm ci
          npm run ${{ matrix.build_script }}
        working-directory: bdgen/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BdGEN-${{ needs.version.outputs.version }}-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - version
      - tag-release
      - build-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.version.outputs.tag }}"
          version="${{ needs.version.outputs.version }}"

          shopt -s nullglob
          assets=(release-artifacts/*.exe release-artifacts/*.dmg)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          notes=$(cat <<EOF
          Automated desktop release for BdGEN $version.

          Quality gates:
          - Backend, frontend and desktop lint passed.
          - Frontend and desktop npm audit passed with no critical vulnerabilities.

          Artifacts:
          - Windows portable executable.
          - Unsigned macOS DMG.

          Note: the macOS DMG is not signed or notarized yet, so Gatekeeper may warn on first launch.
          EOF
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --title "BdGEN $version" --notes "$notes"
          fi
